<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    *{
        padding: 0;
        margin: 0;
    }
    header{
        position: sticky;
        top: 0;
    }
    main{
        background-color: black;
    }
    nav{
        background-color: aqua;
        height: 70px;
    }
    ul li{

        border:2px solid white;
        height: 50px;
        text-align: center;
        padding: 30px;
        margin-top: 100px;
        border-radius: 25px;
        margin-left: 500px;
        margin-right: 500px;
        font-size: 5vh;
        font-weight: 800;
        color: white;

    footer{
        background-color: rgb(20, 207, 135);
        height: 50px;
        margin-top: 100px;
        
    }
    .icon-up{
        height: 30px;
        width: 30px;
        background-color: black;
        margin: 5px;
        color: aliceblue;
        text-align: center;
        border-radius: 15px;
        position: fixed;
        right: 23px;
        bottom: 10px;
        
    }

    
</style>
</head>
    
<body>
    <main>
    <header>
    <nav>
        <ul>
            <li><a href="#"></a>Home</li>

    </div>

    </div>

</html>

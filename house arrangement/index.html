     <script>
    let students = [
      "Luna", "Milo", "Zane", "Eliot", "Grace",
      "David", "Alexandria", "Christopher", 
      "Margaritha", "Constantinopley", "Maximilianosky", "Featherlighton"
    ]

    let houses = []

    for (let i = 0; i < students.length; i++) {

        }

        }

        }

    }


  </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .card {
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid black;
        width: 700px;
    }

    .image img {

        display: flex;
        justify-content: center;
        width: 140px;
        height: 127px;
        margin-left: -20px;

    }

    .text h1 {
        padding: 4px;
        margin-top: -45px;
    }

    .text p {
        padding: 4px;
        margin-top: -25px;
    }

    .image {
        position: relative;
    }

    .capsule {
        background: rgba(7, 1, 1, 0.37);
        opacity: 1.8;
        position: absolute;
        z-index: 10;
        bottom: 4px;
        color: white;
        margin: 1px;
        padding: 2px;
        left: 80px;
        border-radius: 4px;
        font-size: 12px;
    }
</style>

<body>
    <div class="container">
        <div class="card">
            <div class="image"><img src="image/7f80aa49-9161-43a3-8e11-d61f7a95ba5f.png">
                <div class="capsule">31:00</div>
            </div>
            <div class="text">
                <h1>Walcome to channel | It is the first vlog</h1>
                <p>Done by inder. 578k views . 4 months ago</p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
